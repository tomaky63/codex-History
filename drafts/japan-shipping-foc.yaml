    author: マルク・レビンソン
    publisher: 日経BP
    year: 2007
    notes: コンテナ化と同時代の海運構造変革の文脈として参照。FOC化への言及も含む。

  - source_key: src2
    kind: BOOK
    title: 日本海運業の現状と課題
    author: 国土交通省海事局
    publisher: 国土交通省
    year: 2010
    url: https://www.mlit.go.jp/
    notes: 日本籍船・日本人船員の統計的推移を示す一次資料に近い官庁資料。

  - source_key: src3
    kind: ARTICLE
    title: 便宜置籍船問題の構造と日本海運の対応
    author: 寺田一薫
    publisher: 海運経済研究
    year: 1995
    notes: FOC化の経済的・制度的構造を学術的に分析した文献。

  - source_key: src4
    kind: BOOK
    title: 海運の経済学
    author: 苦瀬博仁
    publisher: 成山堂書店
    year: 2002
    notes: 日本海運業の構造変化と国際競争力を包括的に論じた教科書的文献。

relations:
  - to_case: containerization
    relation_type: SAME_INDUSTRY
    note: 同時代の海運業における二つの構造変革。コンテナ化は技術革新による変革、FOC化は制度裁定による変革。

  - to_case: containerization
    relation_type: SIMILAR_MECHANISM
    note: どちらも「誰が価値連鎖のどこを握るか」の再編であり、既存プレイヤー（港湾労働者・日本人船員）が代替された構造が類似。

  - to_case: tdl-founding
    relation_type: CONTRAST
    note: 「所有と運営/旗の分離」という構造は共通だが、TDLは双方が利益を得た分離、FOC化は一方が雇用・税収を失った分離。
