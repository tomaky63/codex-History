# drafts/south-sea-bubble.yaml
# 南海泡沫事件——1720年イギリスで国家債務と株式投機が融合し、議会・王室まで巻き込んで崩壊したバブル

case:
  slug: south-sea-bubble
  title: 南海泡沫事件——国家債務の証券化と株式投機が融合した1720年イギリスの政財一体バブル
  one_liner: 南米貿易の独占権と引き換えに国家債務を引き受けた南海会社の株価が10倍に達した後、1720年秋に崩壊し英国の金融制度を作り直した
  summary: >
    1711年、英国政府は対スペイン戦争で膨張した国家債務を処理するため、南米貿易の独占権を餌に南海会社（South Sea Company）を設立し、債権者に同社株式への転換を促した。1720年に入ると同社は議会に働きかけて全国債の自社株転換権を獲得し、株価操作・賄賂・虚偽の利益見通し提示を組み合わせた株価吊り上げを展開。1月に約100ポンドだった株価は8月に約1000ポンドに達した。しかしバブル抑制を目的とした「バブル法」の逆用による競合社潰しが市場全体の信頼を傷つけ、9月から急落が始まった。取締役会の詐欺的行為が議会調査で暴かれ、ロバート・ウォルポールが事後処理を主導して英国初の首相として台頭した。アイザック・ニュートンは20,000ポンドの損失を被り「天体の運動は計算できても、人の狂気は計算できない」と述べたとされる。南海バブルの崩壊は英国の株式市場規制・国債管理制度・中央銀行機能の礎を形成した。
  period_start: 1711
  period_end: 1721
  status: published
  body_path: content/cases/south-sea-bubble.md

events:
  - year: 1711
    title: 南海会社設立——国家債務と独占貿易権の抱き合わせ
    description: ロバート・ハーレー（オックスフォード伯）主導で南海会社が設立された。スペイン領南米との奴隷貿易・商業独占権を付与する代わりに、保有者が約1000万ポンドの国家債務を同社株式に転換することを条件とした。実際の南米貿易は対スペイン戦争中であり事実上不可能だったが、「将来の独占的利益」というストーリーが債権者を株転換に誘導した。会社設立の本質は貿易会社ではなく「国家債務のリパッケージ手段」だった。
    event_type: FOUNDING
    is_turning_point: false
    display_order: 1

  - year: 1713
    title: ユトレヒト条約——南米貿易独占権の部分的確定と限界の露呈
    description: スペインとの講和条約（ユトレヒト条約）で南海会社は「アシエント（奴隷供給独占権）」と年1隻の商船派遣権を獲得した。しかし南米の実質的な商業独占とは程遠く、利益の大部分はスペイン王室との収益分配で吸収された。会社は事業会社として成立不能であることが早期に判明したが、「国債転換ビークル」としての機能は継続した。投資家への実態開示は曖昧なまま推移した。
    event_type: REGULATORY_CHANGE
    is_turning_point: false
    display_order: 2

  - year: 1720
    title: 国債全量転換計画の議会承認——バブルの起爆
    description: 南海会社は英国残存国債（約3000万ポンド）の全量を自社株式に転換する権利を議会に提案した。イングランド銀行も同様の提案を出したが、南海会社側が700万ポンドの賄賂（議員・王族・大臣への株式無償提供）を用いて承認を勝ち取った。承認発表後、株価は1月の128ポンドから4月に300ポンド、6月に700ポンド台へ急騰した。会社は株価を支えるため分割払い制度・株式ローンを導入し、現金なしでの株式購入を可能にした。
    event_type: REGULATORY_CHANGE
    is_turning_point: true
    display_order: 3

  - year: 1720
    title: 株価1000ポンド到達とバブル法——頂点と崩壊の引き金
    description: 1720年8月、株価は約1000ポンドに達した（年初比約10倍）。同年6月に成立した「バブル法」は王室認可なき株式会社の設立を禁じるものだったが、南海会社取締役会はこれを競合する投機会社への攻撃に利用した。競合社への法的攻撃が市場全体の信頼を損ね、投資家が南海株の処分を始めた。8月末から売りが加速し、9月末には株価は200ポンド台に暴落。分割払い購入者・株式ローン利用者が追い証に対応できず連鎖デフォルトが発生した。
    event_type: CRASH
    is_turning_point: true
    display_order: 4

  - year: 1721
    title: 議会調査とウォルポールの台頭——英国金融制度の再建
    description: 議会調査委員会が南海会社の会計帳簿偽造・株価操作・議員買収の全容を暴いた。複数の取締役が逮捕・資産没収され、財務省長官も収賄で失脚した。ロバート・ウォルポールが後処理を主導し、国債をイングランド銀行・東インド会社に移管する再編案をまとめた。この功績でウォルポールは英国史上最初の「首相（Prime Minister）」として台頭。バブルの後処理が現代的な議院内閣制の原型を生んだという皮肉な遺産を残した。
    event_type: RESTRUCTURING
    is_turning_point: false
    display_order: 5

entities:
  - slug: south-sea-company
    name: 南海会社（South Sea Company）
    kind: COMPANY
    description: 1711年設立の英国特許会社。南米貿易独占権と引き換えに国家債務を引き受けるスキームで設立された。実際の貿易収益はほぼゼロだったが、株式転換ビークルとして機能し続けた。1720年に株価操作・賄賂・虚偽の配当予告を組み合わせた株価吊り上げを実施し、崩壊後に議会調査で詐欺的経営が暴かれた。
    roles_in_case:
      - PROTAGONIST

  - slug: john-blunt-south-sea
    name: ジョン・ブラント（John Blunt）
    kind: PERSON
    description: 南海会社の実質的な設計者・取締役。元布地商人から金融家に転身し、国債転換スキームを考案した。株価操作・議会賄賂・虚偽の配当予告を主導した主犯格。崩壊後の議会調査で全財産（183,000ポンド）の大部分を没収され、5,000ポンドのみ残留を認められた。「実業のない金融工学で国家規模のバブルを作れる」ことを実証した最初期の事例。
    roles_in_case:
      - PROTAGONIST

  - slug: robert-walpole-pm
    name: ロバート・ウォルポール（Robert Walpole）
    kind: PERSON
    description: 英国財務省長官（後に首相）。南海バブルの熱狂期に株式購入に懐疑的で早期売却した数少ない政治家のひとり。崩壊後に後処理を主導し、国債をイングランド銀行・東インド会社に分散移管する再建案を成立させた。この功績で1721年に英国史上初の「首相」として台頭した。バブルの「崩壊後処理者」が新たな権力の形を生んだ典型例。
    roles_in_case:
      - REGULATOR

  - slug: isaac-newton-investor
    name: アイザック・ニュートン（Isaac Newton）
    kind: PERSON
    description: 万有引力の法則で知られる科学者。造幣局長官として1720年当時の金融政策に関与していた。1720年春に保有する南海株を7,000ポンドの利益で売却したが、その後の株価急騰を見て買い戻し、最終的に約20,000ポンドを失った。「天体の運動は計算できても、人の狂気は計算できない」という言葉を残したとされる（真偽不明）。「合理的な専門家でもバブルに巻き込まれる」という人間行動の普遍的な例として引用される。
    roles_in_case:
      - OTHER

  - slug: bank-of-england-1720
    name: イングランド銀行（Bank of England）
    kind: INSTITUTION
    description: 1694年設立の英国中央銀行。南海会社の国債転換提案に対して対抗案を提出したが（議会に敗れた）、崩壊後の国債再編でその機能を強化した。南海バブルの後処理を通じて、英国の国債管理における中心的役割を確立した。チューリップバブルのオランダと同様、中央銀行機能の強化がバブル崩壊の「副産物」として生まれた。
    roles_in_case:
      - REGULATOR

lessons:
  - statement: 南海会社は実質的な事業収益がほぼゼロだったにもかかわらず、「将来の独占的利益」という不確かなストーリーと国家の信用保証（という誤解）だけで1000ポンントまで株価が上昇した。「事業の実態」と「株価を支えるストーリー」の乖離が最大化した時がバブルの頂点であり、乖離が可視化された瞬間に崩壊する。
    kind: PATTERN
    applies_to: 実態のない成長ストーリーによる株価形成の評価。「将来の独占的利益」を根拠にした高バリュエーションの持続可能性分析
    display_order: 1

  - statement: バブル法は競合する投機会社を抑制する目的だったが、南海会社がこれを競合社への攻撃に利用したことで市場全体の信頼が崩れ、自社株の崩壊を招いた。「競合を潰す規制の悪用」が自壊の引き金になった——規制による市場支配は競争力の代替にはならず、市場全体の信頼を毀損するリスクを持つ。
    kind: ANTI_PATTERN
    applies_to: 独占的地位を維持するための規制利用の評価。競合排除が市場の信頼を破壊するリスク分析
    display_order: 2

  - statement: 崩壊後の後処理（ウォルポールの国債再編）が英国史上初の首相職という新たな権力形態を生んだ。南海バブルはインフラを残さなかったが、「政治制度の革新」を残した。バブルの崩壊後処理者は、問題を収拾する過程で新たな権力と制度的権威を獲得することがある。
    kind: MECHANISM
    applies_to: 大規模金融危機の後処理プロセスにおける政治権力の変容分析。「誰が後処理を主導するか」という問いの重要性
    display_order: 3

  - statement: アイザック・ニュートンは株式を一度売却して7,000ポンドの利益を得た後、「まだ上がる」と信じて買い戻し20,000ポンドを失った。「一度正しい判断をした合理的な人物が、その後の熱狂に巻き込まれる」というパターンは、知性や専門性がバブルへの免疫にならないことを示す。
    kind: HEURISTIC
    applies_to: バブル期の投資判断の自己評価。「自分は賢いので早めに抜けられる」という過信バイアスの危険性分析
    display_order: 4

  - statement: 南海バブルとミシシッピバブルは1720年に同時進行した。英仏両国の投資家が互いの国のバブルに参加しており、一方の崩壊が他方を加速した。グローバルに連動した金融バブルは、個別国家の対応では制御できない——2008年のリーマンショックに至る「バブルの国際連鎖」の最初期事例。
    kind: FORECAST_METHOD
    applies_to: 国際的に連動する金融バブルの波及分析。一国のバブル崩壊が他国市場に波及するメカニズムの初期事例として
    display_order: 5

sources:
  - source_key: src1
    kind: BOOK
    title: "The South Sea Bubble"
    author: John Carswell
    publisher: Cresset Press
    year: 1960
    notes: 南海バブルに関する最も詳細な古典的研究。一次資料（議会文書・南海会社記録・個人書簡）を用いた政治的・金融的経緯の完全な記述。バブル期の内部意思決定と崩壊後の議会調査プロセスを詳細に追う。

  - source_key: src2
    kind: BOOK
    title: "Devil Take the Hindmost: A History of Financial Speculation"
    author: Edward Chancellor
    publisher: Farrar Straus Giroux
    year: 1999
    notes: 南海バブルを含む金融投機の通史。チューリップバブルから20世紀末のドットコムバブルまでを一貫した分析軸で追う。南海バブルとミシシッピバブルの同時進行・相互作用を詳しく論じた章が特に有益。

  - source_key: src3
    kind: BOOK
    title: "Extraordinary Popular Delusions and the Madness of Crowds"
    author: Charles Mackay
    publisher: Richard Bentley
    year: 1841
    notes: 南海バブルをチューリップバブル・ミシシッピバブルと並べて「群衆心理の典型例」として描写した古典。現代の研究では誇張が指摘されているが、事件の基本的な経緯を描写した最初期の通俗的記述として依然引用される。

  - source_key: src4
    kind: BOOK
    title: "The Bubble Act: Its Passage and Its Effects on Business Organization"
    author: Ron Harris
    publisher: Journal of Economic History
    year: 1994
    notes: バブル法の立法経緯と経済的影響を分析した学術論文。南海会社がバブル法を競合排除に利用した経緯、その後の英国株式会社法制への影響（バブル法は1825年まで存続）を詳述。「規制が自壊を招いた」メカニズムの一次的分析。

relations:
  - to_case_slug: mississippi-bubble
    relation_type: SIMILAR_MECHANISM
    note: 南海バブルとミシシッピバブルは1720年に同時進行した国際的な投機バブル双子。どちらも「国家債務の証券化＋独占貿易権のストーリー」を軸に形成され、同年に崩壊した。英仏の投資家が互いの国のバブルに参加しており、一方の崩壊が他方を加速した。現代的に言えば「相関が高まった時にリスク分散は機能しない」という教訓の原型。

  - to_case_slug: tulip-mania
    relation_type: SIMILAR_MECHANISM
    note: チューリップバブルとの共通点は「実態のない将来価値への投機」だが、南海バブルは国家・議会・王室が直接関与した点で規模と構造が異なる。チューリップは私的な花卉市場、南海は国家財政と一体化した政財バブル——「投機の公的化」の典型例として対比できる。

  - to_case_slug: railway-mania-1840s
    relation_type: CONTRAST
    note: 鉄道バブルは崩壊後に9500マイルのインフラを残したが、南海バブルは制度的遺産（首相職、国債管理制度）を残した。どちらも「バブルが有形・無形の遺産を残す」パターンだが、遺産の性質が物理的インフラか政治制度かという対比が興味深い。
