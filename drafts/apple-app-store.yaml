    publisher: Simon & Schuster
    year: 2011
    notes: Jobs自身へのインタビューに基づくApp Store設計思想と「ウェブアプリで十分」から転換した経緯の一次証言

  - kind: BOOK
    title: "The App Generation: How Today's Youth Navigate Identity, Intimacy, and Imagination in a Digital World"
    author: Howard Gardner, Katie Davis
    publisher: Yale University Press
    year: 2013
    notes: App Economyの社会・文化的影響の分析。アプリが世代のアイデンティティ形成に与えた影響

  - kind: ARTICLE
    title: "Epic Games, Inc. v. Apple Inc., Case No. 4:20-cv-05640"
    author: U.S. District Court, Northern District of California
    publisher: Federal Court Filing
    year: 2021
    notes: Epic対Apple訴訟の判決文。App Storeの独占性・30%手数料の競争法上の問題について最も詳細な法的分析

  - kind: ARTICLE
    title: "App Store Review Guidelines"
    author: Apple Inc.
    publisher: Apple Developer Documentation
    year: 2022
    notes: Appleが公式に定めるApp Store審査ガイドライン。Walled Gardenの具体的ルールの一次資料

relations:
  - to_case_slug: famicom-platform
    relation_type: SIMILAR_MECHANISM
    note: 任天堂がサードパーティゲームを審査・管理してファミコンプラットフォームを支配した構造の、数十年後・数百倍規模の再現。「ハードウェア支配 → ソフトウェア流通支配」のメカニズムが同型

  - to_case_slug: credit-card-network
    relation_type: SIMILAR_MECHANISM
    note: クレジットカードネットワークも加盟店（開発者）と消費者の両面市場であり、取引毎の手数料（約2-3%）という収益構造が類似。App Storeの30%は「決済インフラ+流通独占」の複合対価

  - to_case_slug: intel-inside-ingredient-branding
    relation_type: CONTRAST
    note: IntelはオープンなPCエコシステムでブランド浸透（誰でも組み立てPC可）、AppleはクローズドなiOSで品質担保（Appleしか制御できない）という対照的なプラットフォーム支配戦略
