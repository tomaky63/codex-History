relations:
  - to_case: tdl-founding
    relation_type: SAME_PATTERN
    note: >
      個人の長期執念(十河信二 / 高橋政知)が巨大プロジェクトを駆動する
      共通パターン。組織ではなく「粘る個人」が決定要因になる構造。

  - to_case: containerization
    relation_type: CONTRAST
    note: >
      新幹線は国家主導の巨大インフラ、コンテナ化は民間発の破壊的インフラ。
      巨大インフラ成立の2つの型の対比。
