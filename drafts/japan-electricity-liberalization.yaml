# drafts/japan-electricity-liberalization.yaml
# 日本の電力自由化と発送電分離——9電力体制の70年と構造解体の軌跡

case:
  slug: japan-electricity-liberalization
  title: 日本の電力自由化と発送電分離——9電力体制の70年と構造解体の軌跡
  period_start: 1951
  period_end: 2020
  primary_themes:
    - regulatory-turning-points
    - vertical-restructuring

events:
  - id: ev1
    year: 1951
    title: 電気事業再編令施行——9電力体制の確立
    description: GHQ占領終結前後に電気事業再編令が施行され、日本発送電株式会社が解体されて9つの地域民営電力会社が設立された（北海道・東北・東京・中部・北陸・関西・中国・四国・九州）。各社は発電・送電・配電・小売を垂直統合し、政府認可の総括原価方式で料金が決まる地域独占体制が確立。「安定供給優先」の思想が半世紀以上の制度的基盤を形成した。
    event_type: FOUNDING
    is_turning_point: false
    display_order: 1

  - id: ev2
    year: 1995
    title: 電気事業法改正・IPP参入解禁——独占の壁に最初の楔
    description: 電気事業法が改正され、独立発電事業者（IPP）が卸電力市場に参入できるようになった。英国（1989年）・米国（1992年）の電力自由化に遅れること6〜7年。参入規模は小さく、送電網は依然として電力会社が管理したままだったが、「電力も競争産業になりうる」という命題が制度的に承認された最初の転換点。
    event_type: REGULATORY_CHANGE
    is_turning_point: true
    display_order: 1

  - id: ev3
    year: 2000
    title: 特別高圧の小売自由化開始——大口顧客向け競争の幕開け
    description: 契約電力2,000kW以上の大口需要家（大工場・大型ビル）を対象に電力小売が自由化された。2004年には500kW以上（中小工場）、2005年には50kW以上（中小企業）へと拡大。しかし送電網（系統）は電力会社管理のままで、新規参入者への接続条件は非対称だった。家庭・小規模事業者（低圧）は自由化の対象外が続いた。
    event_type: REGULATORY_CHANGE
    is_turning_point: false
    display_order: 1

  - id: ev4
    year: 2011
    month: 3
    title: 東日本大震災・福島第一原発事故——電力構造改革の政治的起動
    description: 東日本大震災と福島第一原発1〜4号機の事故により、東京電力は「計画停電」を実施し電力独占体制のリスクが可視化された。原発コストの総括原価方式による転嫁、送電インフラの独占管理への批判が急速に高まった。菅直人首相が「脱原発」を個人的に宣言し、孫正義が「自然エネルギー財団」を設立して再エネ普及を政治的に訴えた。平時では突破できなかった電力業界の政治力を、危機が上回った転換点。
    event_type: CRISIS
    is_turning_point: true
    display_order: 1

  - id: ev5
    year: 2012
    title: 固定価格買取制度（FIT）開始——再生可能エネルギー急拡大の引き金
    description: 再生可能エネルギー固定価格買取制度（FIT法）が施行された。太陽光・風力・地熱・中小水力・バイオマスの電力を電力会社が固定価格（当初太陽光は48円/kWh）で20年間買い取ることを義務付け。民間の再エネ投資が急拡大し、太陽光発電設備容量は5年で20倍以上になった。一方でFIT賦課金（2022年時点で年間約3兆円超）が電力料金に上乗せされ、コスト負担が可視化された。
    event_type: POLICY_SHIFT
    is_turning_point: false
    display_order: 1

  - id: ev6
    year: 2016
    title: 小売全面自由化——家庭も電力会社を選べる時代
    description: 2016年4月、家庭向け（低圧）を含む電力小売が完全自由化された。広域系統運用機関（OCCTO）が2015年に設立され、系統の中立的管理が制度化された。初年度だけで300社以上の新電力が参入し、通信・ガス・スーパーが電力小売に参入。競争が始まった一方、2022年の燃料高騰（ウクライナ侵攻）で多数の新電力が撤退・倒産し、自由化市場設計の脆弱性が露呈した。
    event_type: REGULATORY_CHANGE
    is_turning_point: false
    display_order: 1

  - id: ev7
    year: 2020
    title: 法的分離（発送電分離）完成——送配電の形式的中立化
    description: 各電力会社の送配電部門が独立した法人として分離され、法的発送電分離が完成した（東京電力パワーグリッド、九州電力送配電等）。しかし各送配電会社は依然として親会社グループの100%子会社として設立され、系統接続のノンファーム問題・優先給電ルール問題は未解決のまま残った。「形式的分離が実質的競争を保証しない」という構造はNTT民営化の前例と同型。
    event_type: RESTRUCTURING
    is_turning_point: true
    display_order: 1

entities:
  - slug: tepco
    name: 東京電力（TEPCO）
    kind: COMPANY
    description: 日本最大の電力会社。東京・神奈川・千葉・埼玉等の首都圏を供給エリアとし、9電力体制の中心的存在。2011年3月11日の福島第一原発事故の当事者として、電力システム改革の政治的起動装置となった。2016年に福島原子力補償勘定を分離する再編を実施。2020年に送配電部門（東京電力パワーグリッド）を法的分離した。
    roles_in_case:
      - PROTAGONIST

  - slug: meti-japan
    name: 経済産業省（資源エネルギー庁）
    kind: INSTITUTION
    description: 日本の電力政策を所管する省庁。通産省時代から電力会社との「護送船団」的な関係を維持し、改革に慎重な姿勢を保ってきた。福島事故後に「電力システム改革専門委員会」を設置し、三段階改革（OCCTO設立・小売自由化・法的分離）を設計・推進した。
    roles_in_case:
      - REGULATOR

  - slug: kan-naoto
    name: 菅直人
    kind: PERSON
    description: 第94代内閣総理大臣（在任2010〜2011年）。福島事故後に個人として「脱原発」を宣言し、官邸主導でFIT法の国会審議を加速させ退陣前に成立させた。「政治生命をFITに賭けた」と後に語るほどの個人的こだわりで、経産省・電力業界・民主党内の反対を押し切った。日本の再エネ転換の政治的起点を作った人物。
    roles_in_case:
      - ENABLER

  - slug: son-masayoshi
    name: 孫正義（ソフトバンク）
    kind: PERSON
    description: ソフトバンク創業者・CEO。2011年の福島事故後に「自然エネルギー財団」を設立し、全国の知事・首長に再エネ普及を呼びかけた。100GWの再エネ投資構想を発表し、FIT価格の引き上げを世論・メディアを通じて経産省に訴え続けた。再エネ分野での「外部参入者による構造変革」の推進者として電力業界の保守性に挑戦した。
    roles_in_case:
      - DISRUPTOR

  - slug: occto
    name: 電力広域的運営推進機関（OCCTO）
    kind: INSTITUTION
    description: 2015年設立の電力系統の広域的運用を管理する中立機関。全国の送電線をつなぐ「広域系統運用」を担い、電力不足時の融通・再エネ接続の調整を行う。9電力体制下で各社バラバラだった系統運用の「国全体の最適化」を担う組織だが、実際の送配電設備は各電力会社の子会社が保有するため権限は限定的。
    roles_in_case:
      - ENABLER

lessons:
  - id: l1
    statement: 送電網（ラストマイル）を競合と同一企業が保有・管理する限り、小売自由化は形式的なものに留まる。インフラ独占の解体には「法的分離」だけでなく、接続ルール・接続コスト・優先給電ルールの中立的設計が不可欠だ。NTTのラストマイル問題と同型の構造問題。
    kind: MECHANISM
    applies_to: インフラ産業の自由化設計評価、「発送電分離の実効性」の分析
    tag_refs:
      - pattern/regulatory-arbitrage
      - scope/industry-restructuring

  - id: l2
    statement: 総括原価方式（かかったコストに一定の利益を上乗せする料金設定）は、電力会社が高コスト投資（原発・老朽火力）を維持するほど利益が増えるという逆インセンティブを内蔵している。「費用最小化」ではなく「費用最大化」を促す制度設計の典型的な失敗。
    kind: ANTI_PATTERN
    applies_to: 規制産業の料金設計評価、「許可された独占」のインセンティブ構造分析
    tag_refs:
      - driver/political-reform
      - industry/energy

  - id: l3
    statement: 大型事故・危機は「平時では突破できない既得権構造」を流動化させる政治的起動装置になる。福島事故なしに2016年の小売全面自由化・2020年の法的分離は少なくとも5〜10年遅れていた。「危機が改革の窓を開く」パターンはNTT民営化（国鉄赤字危機）・9電力改革（原発事故）に共通する。
    kind: PATTERN
    applies_to: 規制改革の政治的タイミング分析、「改革の窓が開く条件」の識別
    tag_refs:
      - driver/political-reform
      - scope/industry-restructuring

  - id: l4
    statement: FIT（固定価格買取制度）は再エネ普及を加速するが、コストを「電力会社が吸収する（不透明）」から「消費者が賦課金として直接負担する（透明）」に転換する。コストの可視化は政治的批判を招くが、長期的には市場設計の健全化につながる。
    kind: MECHANISM
    applies_to: 再エネ政策の費用便益分析、補助金制度のコスト分担設計評価
    tag_refs:
      - driver/political-reform
      - industry/energy

  - id: l5
    statement: インフラ改革は「制度的分離」を達成した後も、接続ルール・優先給電ルール・系統情報開示の「細部設計」が競争の実質を決める。英国・ドイツの先行事例と比較すると、日本の発送電分離は「形式の達成」であり「競争の達成」ではない段階にある。
    kind: HEURISTIC
    applies_to: インフラ自由化の実効性評価、「制度改革の達成度」の判定基準
    tag_refs:
      - pattern/regulatory-arbitrage
      - scope/industry-restructuring

sources:
  - source_key: src1
    kind: BOOK
    title: 電力改革——エネルギー政策の歴史的大転換
    author: 橘川武郎
    publisher: 岩波書店
    year: 2012
    notes: 電力産業史・経営史の第一人者による電力自由化の通史。9電力体制の成立経緯から1990年代〜2000年代の段階的自由化の内実、改革が遅れた構造的理由を詳述。福島事故前に書かれたため、事後の改革との対比で「改革前夜に何が問題視されていたか」が分かる基本文献。

  - source_key: src2
    kind: PRIMARY_DOC
    title: 電力システム改革の基本方針
    author: 電力システム改革専門委員会
    publisher: 経済産業省資源エネルギー庁
    year: 2013
    notes: 三段階改革（OCCTO設立・小売全面自由化・法的分離）を決定した専門委員会の報告書。改革の目的・スケジュール・設計思想を政府として公式に示した一次資料。「なぜ発送電分離が必要か」の官側の論拠を確認できる。

  - source_key: src3
    kind: BOOK
    title: 電力自由化の経済学——再エネ・脱炭素時代の市場設計
    author: 松村敏弘
    publisher: 日本経済新聞出版
    year: 2021
    notes: 東京大学社会科学研究所教授による電力市場設計の経済分析。容量市場・調整力市場・FIT制度の設計問題を経済学的に検討し、「自由化後の市場が機能するための条件」を明示。発送電分離後の残存問題を理解するための学術的基礎。

  - source_key: src4
    kind: PRIMARY_DOC
    title: "Japan 2021: Energy Policy Review"
    author: International Energy Agency
    publisher: IEA
    year: 2021
    notes: IEAによる日本のエネルギー政策の包括的レビュー。電力自由化の進捗・再エネ導入状況・系統制約問題・脱炭素化目標との整合性を国際比較の視点から評価。「日本の改革は他のOECD国と比較してどの段階か」を把握する一次資料。

relations:
  - to_case: ntt-privatization
    relation_type: SAME_PATTERN
    note: 「自然独占的なインフラを垂直統合で持つ国策企業」の改革という構造が同型。NTTのラストマイル独占問題と電力の送配電独占問題は、「インフラを競合と同一企業が管理する限り形式的自由化に留まる」という同一のメカニズム。NTTは16年後にソフトバンクのADSL参入で突破された。電力の「ソフトバンク的参入者」は2024年現在未登場。

  - to_case: jnr-privatization
    relation_type: SAME_PATTERN
    note: 同じく日本の大型国策インフラの自由化・民営化改革。国鉄は地域分割（コスト縮小戦略）、電力は垂直分離（競争導入戦略）という異なる設計を選んだ。国鉄分割民営化は「赤字の社会問題化」が引き金、電力は「原発事故」が引き金という「危機が改革の窓を開く」共通パターン。

  - to_case: global-crossing-telecom-bubble
    relation_type: CONTRAST
    note: 米国の1996年通信法は「競争が多すぎた」（過剰投資バブル）失敗、日本の電力自由化は「競争が少なすぎた」（形式的自由化）失敗という対比。規制緩和の「設計過剰」と「設計不足」の両極端を代表するケース。インフラ産業の競争政策はどちらに転んでも失敗できるという教訓。
