# drafts/salesforce-saas-category.yaml
# Salesforceの成立とSaaSカテゴリ創造——「ソフトウェアは死んだ」からCRM世界一まで

case:
  slug: salesforce-saas-category
  title: Salesforceの成立とSaaSカテゴリ創造——「ソフトウェアは死んだ」からCRM世界一まで
  period_start: 1999
  period_end: 2022
  primary_themes:
    - vertical-restructuring
    - standardization-wins

events:
  - id: ev1
    year: 1999
    title: Salesforce設立・「No Software」宣言——産業カテゴリーへの反定義から始まる
    description: Oracleのトップセールスマンだったマークベニオフがサバティカルを取り、共同創業者のパーカー・ハリスらとSalesforce.comを設立。「ソフトウェアは終わりだ（The End of Software）」を宣言し、「No Software」ロゴ（赤丸に×）を掲げた。ブラウザで使えるCRMを月額$50/ユーザーから提供するというモデルは、$500万〜$5,000万の永続ライセンスが常識だった当時のエンタープライズ市場への根本的な挑戦だった。
    event_type: FOUNDING
    is_turning_point: true
    display_order: 1

  - id: ev2
    year: 2000
    title: Siebel World会場外での抗議デモ——アンチポジショニングの実践
    description: Siebel Systemsの年次ユーザーカンファレンス「Siebel World」の会場外に、Salesforceが雇ったデモンストレーターが「ソフトウェアを葬るためにここへ来た」というプラカードを持って登場。CRM市場50%以上のシェアを持つSiebel（当時の業界の支配者）に直接挑戦するゲリラマーケティング。エンタープライズ・ソフトウェア業界全体に「SaaSという新しいカテゴリーが来た」ことを周知させた。
    event_type: ENTRY
    is_turning_point: false
    display_order: 1

  - id: ev3
    year: 2004
    title: NYSE上場（ティッカー：CRM）——エンタープライズSaaSとして初の公開市場上場
    description: 2004年6月、Salesforce.comがNYSE上場（ティッカー：CRM）。$1.1億調達。IPO時点で年商$5,100万・純損失$5,300万という「旧来指標では上場できない」財務状況だったが、ARR・NRR（ネット・レベニュー・リテンション）という新指標での評価を市場に要求した。このIPOがウォール街に「SaaS企業の評価軸は収益成長とNRRだ」というフレームワークを定着させ、後の数千社のSaaS企業の上場モデルを作った。
    event_type: BREAKTHROUGH
    is_turning_point: true
    display_order: 1

  - id: ev4
    year: 2005
    title: AppExchange開設——エンタープライズSaaSマーケットプレイス、iPhoneより3年早く
    description: Salesforceのプラットフォーム上でISV（独立ソフトウェアベンダー）がアプリを作って販売できる「AppExchange」を開設。AppleのApp Store（2008年）より3年早い、世界初のエンタープライズ向けアプリマーケットプレイス。顧客はAppExchangeアプリを多数使うほどSalesforceから離脱しにくくなる（エコシステム・ロックイン）。2022年時点で6,000以上のアプリが登録される生態系に成長。
    event_type: BREAKTHROUGH
    is_turning_point: false
    display_order: 1

  - id: ev5
    year: 2008
    title: Force.com（PaaS）発表——SaaSからPaaSへ、Salesforceがプラットフォームに
    description: Salesforceのインフラ上でCRM以外の任意のビジネスアプリケーションを開発・実行できるForce.com（Platform as a Service）を発表。「CRMを使う場所」から「アプリケーションを作る場所」への上位概念への拡張。ISVは独自のクラウドアプリをSalesforceのインフラ上でゼロから構築できる。これがSalesforceを「ソフトウェア会社」から「クラウドプラットフォーム会社」へと位置づけ直した。
    event_type: TECHNOLOGY_SHIFT
    is_turning_point: false
    display_order: 1

  - id: ev6
    year: 2009
    title: 年商$10億突破——SaaSが「ニッチ技術」から「エンタープライズの標準」へ
    description: 設立10年でSalesforceの年商が初めて$10億を突破。Fortune500企業がCRM主要システムとしてSalesforceを採用するケースが一般化し、「中小企業向けのWebサービス」から「大企業のコアシステム」へのポジション転換が完成した。同年代にAWSも急成長し、インフラ層（AWS）とアプリケーション層（Salesforce）の二層でのクラウド普及が同時進行した。SaaSの「普及フェーズ」の確定点。
    event_type: BREAKTHROUGH
    is_turning_point: true
    display_order: 1

  - id: ev7
    year: 2021
    title: Slack買収$277億——Microsoft対抗とコラボレーション市場への拡張
    description: Salesforceがコラボレーション・プラットフォームのSlackを$277億で買収。当時のソフトウェア企業買収としてトップクラスの規模。MicrosoftのTeams（Office 365にバンドル無料提供）がSlackの成長を脅かす中での防衛的買収。買収後、Salesforceの「Customer 360」戦略のコミュニケーション層としてSlackを統合する方針だが、Teamsとの競合において独立性の維持と統合の両立が課題。
    event_type: MERGER
    is_turning_point: false
    display_order: 1

entities:
  - slug: salesforce-inc
    name: Salesforce（セールスフォース）
    kind: COMPANY
    description: 1999年設立（米国カリフォルニア州サンフランシスコ）。CRMのSaaS型提供パイオニア。2022年時点で年商$263億・従業員79,000人・CRM市場グローバルシェア約24%。No Softwareという反ポジショニング、マルチテナント・アーキテクチャ、AppExchangeエコシステム、Customer Successという概念を通じてSaaS産業の設計図を作った。Dreamforceカンファレンスは年間17万人以上が参加する世界最大のソフトウェアカンファレンスに成長。
    roles_in_case:
      - PROTAGONIST

  - slug: marc-benioff
    name: マーク・ベニオフ
    kind: PERSON
    description: Salesforce共同創業者・会長兼CEO（1964〜）。Oracle在籍時にラリー・エリソンの直弟子として最年少副社長に。1999年に37歳で独立。「No Software」「顧客中心」「Ohana（家族）文化」「1-1-1モデル（株式・製品・時間の各1%を社会に寄付）」をSalesforceの理念として体現した。2018年にTimeの共同オーナーになりジャーナリズムにも投資。エンタープライズ・SaaSとデジタル・フィランソロピーの象徴的人物。
    roles_in_case:
      - PROTAGONIST

  - slug: parker-harris
    name: パーカー・ハリス
    kind: PERSON
    description: Salesforce共同創業者・元CTO（1968〜）。マルチテナント・クラウドアーキテクチャの設計者。Salesforceの技術的革新の中心人物。数千万社が同一インフラを共有しながらデータを完全分離する設計は、SaaSビジネスモデルの経済的優位（スケールするほど1顧客当たりコストが下がる）の技術的基盤を作った。ハリスなしにはベニオフのビジョンは実装不可能だった。
    roles_in_case:
      - PROTAGONIST

  - slug: siebel-systems
    name: Siebel Systems（シーベル・システムズ）
    kind: COMPANY
    description: 1993年設立（米国カリフォルニア）のCRMソフトウェア最大手。2002年時点でCRM市場の50%以上を支配。Oracleを退職したトーマス・シーベルが設立。大規模な永続ライセンス販売と高額実装コンサルティングを組み合わせた「エンタープライズ・ソフトウェアの旧モデル」の象徴。Salesforceの台頭に対応できず、2006年にOracleに$58億で買収されて独立企業として消滅した。Salesforceの「What not to be」として機能した。
    roles_in_case:
      - ANTAGONIST

  - slug: oracle-corporation
    name: Oracle（オラクル）
    kind: COMPANY
    description: 1977年設立（米国カリフォルニア）のデータベース・エンタープライズソフト大手。Salesforce創業者ベニオフの出身企業。ラリー・エリソンはSalesforce設立の初期投資家（$2百万）でもあり、ベニオフのメンターだった。2011年以降にOracle CX（CRM）でSalesforceと直接競合。Siebel Systems・PeopleSoft・NetSuiteを買収してSaaS分野に参入しようとしたが、クラウドネイティブの競争力でSalesforceに及ばなかった。「大企業がSaaSに対応する難しさ」の典型。
    roles_in_case:
      - ANTAGONIST

lessons:
  - id: l1
    statement: 製品の競争をする前に「産業カテゴリー」の定義者になることが最強のポジショニングだ。SalesforceはSiebel（より良いCRM）を作るのではなく「ソフトウェアという産業を終わらせる」と宣言することで、競合が誰であるかを自分で設定した。後続のSaaS企業すべてが「私たちはSalesforceが定義したカテゴリーに属する」と名乗ることで、Salesforceは「本家」になった。
    kind: PATTERN
    applies_to: 新市場参入時の競争軸設計、「製品改良」ではなく「カテゴリー定義」という戦略の選択
    tag_refs:
      - pattern/outsider-innovation
      - pattern/customer-interface-winner

  - id: l2
    statement: マルチテナント・アーキテクチャは「顧客数に比例しないコスト構造」を生む。全顧客が単一のインフラを共有するため、顧客数が10倍になってもインフラコストは10倍にならない。この「Operating Leverage」がSaaSビジネスの高い営業利益率（成熟期で20〜40%）を支え、ソフトウェアの「スケールするほど儲かる」構造を完成させた。
    kind: MECHANISM
    applies_to: SaaS・クラウドサービスのアーキテクチャ選択、「スケーラビリティと収益性の両立」設計
    tag_refs:
      - pattern/cost-structure-shift
      - industry/software

  - id: l3
    statement: サブスクリプションの「Land and Expand」は、初期の意思決定障壁を下げることで、長期的には永続ライセンスより大きな収益を生む。5ユーザー$250/月から始めた顧客が、数年後に500ユーザー$25,000/月になる。NRR>100%という指標が示すように、既存顧客が成長するだけで収益が増えるモデルは、新規顧客獲得コストに依存しない安定した成長を生む。
    kind: MECHANISM
    applies_to: エンタープライズ向けSaaSの成長戦略設計、「初期参入障壁の低下と長期収益最大化の両立」
    tag_refs:
      - pattern/subscription-model
      - pattern/network-effect

  - id: l4
    statement: エコシステム（AppExchange型）のロックインは、製品のロックインより強い。顧客がマーケットプレイスのアプリを多数使うほど、プラットフォームを離れるコストが増加する。製品自体の優劣より、生態系への依存度がスイッチングコストを決定する。AppleのApp Storeの成功以前に、SalesforceはエンタープライズでこのメカニズムをAppExchangeで証明した。
    kind: MECHANISM
    applies_to: プラットフォーム型ビジネスのエコシステム設計、「製品ロックイン」vs「生態系ロックイン」の評価
    tag_refs:
      - scope/platform-ecosystem
      - pattern/network-effect

  - id: l5
    statement: 「顧客の成功が自社の成功」というインセンティブ設計の変更は、新しい職種（Customer Success Manager）と組織設計を生む。SaaSの解約リスクは、ベンダーのインセンティブを「大きな取引を閉じる」から「顧客が実際に使い続けてもらう」に変えた。このインセンティブ変化が産業全体の「顧客対応の質」を変え、CSMという職種が2010年代のソフトウェア産業の標準になった。
    kind: PATTERN
    applies_to: サブスクリプション型ビジネスの組織設計、顧客継続率（Retention）を高める組織・インセンティブ設計
    tag_refs:
      - pattern/subscription-model
      - pattern/customer-interface-winner

sources:
  - source_key: src1
    kind: BOOK
    title: Behind the Cloud
    author: Marc Benioff and Carlye Adler
    publisher: Jossey-Bass（日本語版「クラウド誕生」ダイヤモンド社）
    year: 2009
    notes: ベニオフ自身による創業期の内幕。「No Software」ポジショニングの発想・Siebel World会場外デモの詳細・初期の財務危機・IPO準備・AppExchange発案の経緯を当事者視点で記述。設立から$10億達成までの1次資料として不可欠。V2MOM（ビジョン・価値・メソッド・障害・指標）という独自経営フレームワークも詳説。

  - source_key: src2
    kind: BOOK
    title: Trailblazer
    author: Marc Benioff and Monica Langley
    publisher: Currency（日本語版「トレイルブレイザー」東洋経済新報社）
    year: 2019
    notes: 2009年以降のSalesforceの成長・買収戦略・1-1-1モデル・企業の社会的責任論を扱った第2弾。Slack買収前後、AI戦略、Microsoftとの競合、気候変動への取り組みなど、スケールアップ後のSalesforceの経営判断を理解するための参照文献。

  - source_key: src3
    kind: BOOK
    title: From Impossible to Inevitable
    author: Aaron Ross and Jason Lemkin
    publisher: Wiley
    year: 2016
    notes: SalesforceのAaron Rossが「Predictable Revenue（予測可能な収益）」モデルを詳述した実務書。Salesforceが確立したSDR（Sales Development Representative）分業とインバウンドマーケティングによるSaaSの再現可能な成長エンジンの設計を説明。Land and Expand・NRR等のSaaS固有概念を理解するための定番。

  - source_key: src4
    kind: ARTICLE
    title: "SaaS Metrics 2.0 — A Guide to Measuring and Improving What Matters"
    author: David Skok
    publisher: For Entrepreneurs (forEntrepreneurs.com)
    year: 2012
    notes: SaaSビジネスの評価指標（ARR・MRR・NRR・LTV・CAC・Payback Period・Rule of 40）を体系化した定番記事。SalesforceのIPO以降、SaaS企業が旧来の収益指標でなく独自指標で評価される根拠を整理。Salesforceが創った評価フレームワークがどう産業標準化されたかを理解するための参照文献。

relations:
  - to_case: amazon-aws
    relation_type: SIMILAR_MECHANISM
    note: AWSが「コンピュートインフラをサービスとして提供（IaaS）」し、SalesforceがCRMを「アプリケーションをサービスとして提供（SaaS）」した。どちらも同じ2000年代前半に同じ「所有から利用へ、CapexからOpexへ」という産業転換を異なるスタック層で実現した。AWSがITインフラを変えた同時代に、SalesforceがビジネスアプリケーションのOS的存在になった。

  - to_case: famicom-platform
    relation_type: SIMILAR_MECHANISM
    note: 任天堂がファミコンプラットフォームをサードパーティのゲーム会社に開放してエコシステムの価値を高めたように、SalesforceはAppExchangeでISVに開発プラットフォームを開放した。どちらも「プラットフォームへの参加者（サードパーティ）が増えるほどプラットフォームの価値が上がる」という二面市場のネットワーク効果を活用した。AppExchangeはiPhoneのApp Store（2008年）の3年前に同構造をエンタープライズで実証した。

  - to_case: credit-card-network
    relation_type: SIMILAR_MECHANISM
    note: クレジットカードネットワークが「加盟店×消費者」の二面市場でネットワーク効果を生んだように、SalesforceのAppExchangeは「ISV×企業顧客」の二面市場でネットワーク効果を生んだ。どちらも「片側を増やすともう片側も増える正のフィードバックループ」と「参加が増えるほど離脱コストが上がるロックイン」を同時に達成した二面プラットフォームの設計として同型。
