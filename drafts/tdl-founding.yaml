case:
  slug: tdl-founding
  title: 東京ディズニーランドの成立史
  period_start: 1960
  period_end: 1983
  primary_themes:
    - asset-operation-split
    - infrastructure-mega-project

events:
  - id: tdl-1960-olc-founded
    year: 1960
    month: 7
    title: オリエンタルランド設立
    description: >
      京成電鉄・三井不動産を主要株主として、千葉県浦安沖の埋立事業と
      娯楽施設開発を目的に設立。設立当初はDisney導入は計画されていない。
    event_type: FOUNDING
    is_turning_point: false
    display_order: 1
    entity_refs: [oriental-land, keisei-dentetsu, mitsui-fudosan]
    source_refs: [olc-ir, awata-tdl-book]

  - id: tdl-1962-chiba-contract
    year: 1962
    title: 千葉県との埋立契約締結
    description: >
      浦安沖の公有水面埋立について千葉県との契約が結ばれ、
      土地取得プロセスの基盤が整う。
    event_type: REGULATORY_CHANGE
    is_turning_point: false
    display_order: 1
    entity_refs: [oriental-land, chiba-pref, kokyu-suimen-umetate-ho]
    source_refs: [olc-ir]

  - id: tdl-1974-disney-contact
    year: 1974
    title: ウォルト・ディズニー・プロダクションズとの本格交渉開始
    description: >
      高橋政知を中心にDisney本社との交渉が本格化。当初Disneyは
      海外展開に極めて慎重であり、5年近い交渉期間を要した。
    event_type: ENTRY
    is_turning_point: false
    display_order: 1
    entity_refs: [oriental-land, disney, takahashi-masachi, card-walker]
    source_refs: [notoji-book, awata-tdl-book]

  - id: tdl-1979-license-contract
    year: 1979
    month: 4
    title: Disney とのライセンス契約締結
    description: >
      Disneyは出資せず、入場料と物販のロイヤリティのみを受け取る形式で合意。
      土地・施設・運営はすべてOLC側が保有する非対称な契約構造となった。
    event_type: BREAKTHROUGH
    is_turning_point: true
    display_order: 1
    entity_refs: [oriental-land, disney, takahashi-masachi]
    source_refs: [notoji-book]

  - id: tdl-1983-opening
    year: 1983
    month: 4
    day: 15
    title: 東京ディズニーランド開業
    description: >
      浦安の埋立地に開業。初年度の集客は計画値を達成し、
      非米国Disneylandの事業可能性を実証した。
    event_type: BREAKTHROUGH
    is_turning_point: true
    display_order: 1
    entity_refs: [oriental-land, disney]
    source_refs: [olc-ir, notoji-book]

entities:
  - slug: oriental-land
