# drafts/mississippi-bubble.yaml
# ミシシッピバブル——ジョン・ローが設計した「紙幣・国債・独占会社」の三位一体スキームと1720年の崩壊

case:
  slug: mississippi-bubble
  title: ミシシッピバブル——ジョン・ローの「紙幣×国債×独占会社」三位一体スキームと1720年の崩壊
  one_liner: スコットランド人ジョン・ローが設計した紙幣発行・国債転換・植民地独占の統合スキームがフランス財政を一時救い、その後ハイパーインフレで崩壊した史上最大規模の紙幣バブル
  summary: >
    1716年、スコットランド出身の経済思想家ジョン・ローはフランス摂政フィリップ・ドルレアンの後援を得て、紙幣発行銀行（バンク・ジェネラル、後のバンク・ロワイヤル）を設立した。同時に、ルイジアナ植民地（ミシシッピ川流域）の貿易独占権を持つミシシッピ会社（後のコンパニー・デ・ザンド）を買収・拡大し、国家財務省機能・税徴収権・東インド・アフリカ貿易独占権を次々と統合した。1719年末からミシシッピ会社株は急騰し、「ミリオネア（millionnaire）」という言葉がこの時期のフランスで初めて使われた。ローの仕組みはフランスの巨額国家債務を株式に転換し、紙幣を大量発行することで一時的に経済を活性化した。しかし1720年に入ると紙幣と金銀の交換制限・廃止が繰り返され、信頼が失墜。株価と紙幣価値は同時に崩壊し、フランスはスコットランド独立銀行の実験に後遺症として「紙幣アレルギー」を100年以上引きずることになった。
  period_start: 1716
  period_end: 1720
  status: published
  body_path: content/cases/mississippi-bubble.md

events:
  - year: 1716
    title: バンク・ジェネラル設立——紙幣発行による国家信用の創造
    description: ジョン・ローは摂政フィリップ・ドルレアンの許可を得て、私立銀行「バンク・ジェネラル」を設立した。土地を担保とした紙幣発行（兌換券）を軸とするローの経済理論を体現した実験。設立当初は健全な準備率を保ち、実際にフランスの商業信用を改善した。政府はこの紙幣を税収受け取りに認め、銀行への信用を高めた。ローの理論は「土地・資源という実物資産に裏付けられた紙幣は、金属貨幣より効率的に経済を回す」というものだったが、後に量的拡大の誘惑に敗れることになる。
    event_type: FOUNDING
    is_turning_point: false
    display_order: 1

  - year: 1717
    title: ミシシッピ会社（コンパニー・ドゥ・ロシアン）の取得——植民地独占の獲得
    description: ローはルイジアナ（ミシシッピ川流域の広大な北米植民地）の貿易独占権を持つコンパニー・ドゥ・ロシアンを取得・再編し、「コンパニー・デ・ザンド（インド会社）」へと発展させた。「ミシシッピ流域には莫大な金銀鉱山と農業資源がある」というプロモーション（実態は未開の原野）が投資家を引き付けた。1718年にはタバコ独占権、1719年には東インド・アフリカ・中国貿易独占権、造幣権、徴税請負権を次々統合し、事実上のフランス経済総括会社となった。
    event_type: EXPANSION
    is_turning_point: false
    display_order: 2

  - year: 1718
    title: バンク・ロワイヤル化——紙幣発行が国家信用と一体化
    description: バンク・ジェネラルが国有化されて「バンク・ロワイヤル（王立銀行）」となった。紙幣の兌換保証が王室の信用によって裏打ちされる形になったが、同時に紙幣発行量の制約が政治的に緩和された。摂政は財政赤字の穴埋めに紙幣を使い始め、発行量が徐々に実物担保を超え始めた。ローはこの段階で「信用創造を通じた経済成長」の理論的可能性を証明しようとしていたが、政治的圧力が量的節制を不可能にしていった。
    event_type: REGULATORY_CHANGE
    is_turning_point: false
    display_order: 3

  - year: 1719
    title: 株価急騰と「ミリオネア」の誕生——バブルの絶頂
    description: 1719年秋から1720年初頭にかけて、コンパニー・デ・ザンド株は500リーブルから10,000リーブル超へ急騰した（20倍超）。パリのヴァンドーム広場周辺には投機参加者が殺到し、「ruelle Quincampoix（キャンカンポワ通り）」が非公式取引の中心となった。使用人が株式売買で成り上がる事例が相次ぎ、「ミリオネア（millionnaire）」という語がこの時期のフランスで初めて使われた。ローは紙幣を大量発行して株式購入資金を市場に供給し、自ら株価を支えるという自己強化サイクルを構築した。
    event_type: BUBBLE
    is_turning_point: true
    display_order: 4

  - year: 1720
    title: 兌換制限と信頼崩壊——紙幣と株価の同時崩壊
    description: 1720年3月、ローは紙幣と金銀の交換を制限・廃止する勅令を発布した。「紙幣を金銀に戻せない」という事実が市場に広まり、株価と紙幣価値が同時に急落した。5月に兌換制限令は撤回されたが信頼は回復せず、6〜7月に株価はピークの1/10以下に崩落。フランス全土でインフレが加速し、実質的なハイパーインフレ状態となった。「紙幣」への信頼が崩壊したことで、フランスでは以後100年以上にわたって紙幣・銀行・株式会社への忌避感が持続した。
    event_type: CRASH
    is_turning_point: true
    display_order: 5

  - year: 1720
    title: ジョン・ロー失脚・亡命——フランス近代金融の挫折
    description: ローは12月にフランスを脱出し、ブリュッセルへ亡命した。彼の全財産はフランス国内で没収された。ローの失脚と共に、フランスは中央銀行制度・紙幣経済・株式会社制度への実験を放棄した。イングランドがイングランド銀行を中心とした近代金融制度を発展させた一方、フランスは1800年のフランス銀行設立まで中央銀行を持たず、17・18世紀の金融革新競争で決定的な遅れを取ることになった。ミシシッピバブルの後遺症がフランス革命の財政的背景のひとつとなったとする歴史家もいる。
    event_type: CRISIS
    is_turning_point: true
    display_order: 6

entities:
  - slug: john-law-economist
    name: ジョン・ロー（John Law）
    kind: PERSON
    description: スコットランド生まれの経済思想家・金融家（1671〜1729）。「土地に裏付けられた紙幣は金属貨幣より効率的」という信用創造理論を持ち、フランスで実験的に実施した。賭博師・決闘の前科を持ち、複数の国で追われていたが、摂政フィリップの庇護でフランスに活躍の場を得た。理論家としては先見的で、ケインズ的な信用乗数効果を200年先取りしていたとも評価される。しかし量的制約を失った信用創造が崩壊することも証明してしまった。亡命後はヴェネツィアでギャンブルで生計を立て、1729年に貧困のうちに没した。
    roles_in_case:
      - PROTAGONIST

  - slug: philippe-orleans-regent
    name: フィリップ・ドルレアン（Philippe d'Orléans）
    kind: PERSON
    description: フランス摂政（1715〜1723）。ルイ14世没後の幼王ルイ15世の摂政として実権を握り、巨額の国家債務に苦しんでいた。ジョン・ローの理論に「国家財政を救う可能性」を見出し、全面的に支援した。バブル期には会社への特権付与・独占権拡大を次々承認し、崩壊後は後処理の混乱の中でもローを一時かばい続けた。ローの失脚後も摂政として統治したが、国家財政の後遺症を修復できないまま1723年に没した。
    roles_in_case:
      - ENABLER

  - slug: compagnie-des-indes
    name: コンパニー・デ・ザンド（Compagnie des Indes）
    kind: COMPANY
    description: ミシシッピ会社が拡大・改組された独占的フランス植民地・貿易会社。ルイジアナ・東インド・アフリカ・中国貿易の独占権に加え、造幣権・徴税請負権まで統合したフランス版VOC。実際の植民地収益はほぼゼロで、「将来の莫大な富」というプロモーションで株価を支えた。バンク・ロワイヤルと一体化したことで、株価と紙幣が連動する自己強化・自己崩壊サイクルを形成した。
    roles_in_case:
      - PROTAGONIST

  - slug: banque-royale-france
    name: バンク・ロワイヤル（Banque Royale）
    kind: INSTITUTION
    description: ジョン・ローが設立したバンク・ジェネラルを国有化した王立銀行。紙幣発行権を持ち、フランス初の近代的中央銀行機能を担った。しかし政治的圧力により紙幣発行量が実物担保を大幅に超えたことで信用が崩壊した。バンク・ロワイヤルの失敗はフランスに「紙幣アレルギー」をもたらし、フランス銀行設立（1800年）まで中央銀行不在という制度的後退を招いた。
    roles_in_case:
      - PROTAGONIST

lessons:
  - statement: ローの信用創造理論は本質的に正しかった——紙幣は金属貨幣より効率的に経済を回せる。しかし「理論が正しい」ことと「政治的制約の中で理論通りに運用できる」ことは別問題だ。財政赤字を抱えた政権が紙幣発行権を持つと、量的節制は政治的に不可能になる。「正しい理論の誤った運用」が崩壊を招くパターン。
    kind: MECHANISM
    applies_to: 金融政策・通貨制度設計における制度的制約の設計。「理論的に正しい政策が政治的に維持不能になる」リスクの分析
    display_order: 1

  - statement: ミシシッピバブルの崩壊はフランスに「紙幣・株式会社・中央銀行への忌避感」を100年以上植え付けた。一方イングランドは南海バブル後に金融制度を整備・強化した。同程度のバブル崩壊でも、「後処理が制度強化に向かうか、制度忌避に向かうか」で次の100年の競争力が決まる。
    kind: PATTERN
    applies_to: 金融危機後の制度設計の分岐分析。崩壊後の「教訓の引き方」が国家・産業の長期競争力を決定するメカニズム
    display_order: 2

  - statement: ジョン・ローは株価を支えるために紙幣を発行し、紙幣を支えるために株価上昇が必要という相互依存ループを構築した。このループは上昇局面では自己強化するが、信頼が一点でも崩れると株価と通貨が同時崩壊する。「相互に支え合う二つの資産」の構造は、一見堅牢に見えて実は脆い。
    kind: ANTI_PATTERN
    applies_to: 相互依存する資産価値の安定性評価。「A がB を支え、B がA を支える」循環構造のリスク分析（現代の例：株式担保ローンのデススパイラル）
    display_order: 3

  - statement: 「ミリオネア（millionnaire）」という語がこの時期のフランスで生まれた。富の民主化・拡散の象徴として語られるが、実態は紙幣膨張による名目的な数字の増加だった。「新語が生まれるほどの熱狂」はバブルの頂点に近い経験則的なシグナルになりうる——新しい資産クラスや現象を表す新語の登場タイミングを追うと、熱狂の程度が可視化される。
    kind: HEURISTIC
    applies_to: バブル熱狂度の定性的評価指標。新語・新概念・新職業の登場がバブルの過熱度を示すアンテナとしての活用
    display_order: 4

  - statement: ジョン・ローは先見的な経済思想家だったが、自分の理論を自ら実施したことでその限界も同時に証明した。「理論家が自ら実験する」という構造は、理論の正当性への過信と量的制約への甘さを生みやすい。外部的な制約・チェック（独立した中央銀行、議会による監視）のない理論実験は暴走リスクを内包する。
    kind: HEURISTIC
    applies_to: 経済政策の設計と制度的チェックの必要性。「自分の理論を自分で実施する」構造のガバナンスリスク分析
    display_order: 5

sources:
  - source_key: src1
    kind: BOOK
    title: "Money and Trade Considered"
    author: John Law
    publisher: Edinburgh
    year: 1705
    notes: ジョン・ロー自身による経済論文。土地担保紙幣の発行による信用創造論を展開した。後のミシシッピ計画の理論的基礎。「信用乗数効果」の先駆的記述として経済思想史的に評価される一方、量的制約についての議論が甘いという批判もある。

  - source_key: src2
    kind: BOOK
    title: "John Law: A Scottish Adventurer of the Eighteenth Century"
    author: H. Montgomery Hyde
    publisher: Home & Van Thal
    year: 1948
    notes: ジョン・ローの生涯を追った伝記。賭博師から経済思想家・フランス財務総監への軌跡、ミシシッピバブルの内部的意思決定、亡命後の晩年を詳述。政治的文脈とローの個人的野心の交錯を理解するための基本文献。

  - source_key: src3
    kind: BOOK
    title: "The Mississippi Bubble: A Memoir of John Law"
    author: John P. Hamilton
    publisher: Riverside Press
    year: 1859
    notes: 19世紀のミシシッピバブル概説書。現代の研究と比べると一次資料の引用は限定的だが、バブルの基本的な経緯と主要人物の行動を把握するための入門的記述として機能する。

  - source_key: src4
    kind: BOOK
    title: "Devil Take the Hindmost: A History of Financial Speculation"
    author: Edward Chancellor
    publisher: Farrar Straus Giroux
    year: 1999
    notes: ミシシッピバブルと南海バブルの同時進行・相互影響を詳細に分析した章を含む金融投機通史。1720年のヨーロッパ規模のバブルとして両者を一体的に論じる現代的な分析の好例。

  - source_key: src5
    kind: BOOK
    title: "Paper Money Collapse: The Folly of Elastic Money and the Coming Monetary Breakdown"
    author: Detlev Schlichter
    publisher: Wiley
    year: 2011
    notes: 現代経済学の視点からミシシッピバブルを「不換紙幣の内在的不安定性」の原型として分析した著作。ジョン・ローの実験が現代の中央銀行制度に与えた示唆を論じる。

relations:
  - to_case_slug: south-sea-bubble
    relation_type: SIMILAR_MECHANISM
    note: ミシシッピバブルと南海バブルは1720年に同時進行した国際連動バブル。どちらも「国家債務の証券化＋独占特権のストーリー」を軸とし、英仏の投資家が互いに参加していた。一方の崩壊が他方を加速した史上最初の国際的バブル連鎖。「分散投資が相関1に向かう時にリスクヘッジは機能しない」という現代的教訓の原型。

  - to_case_slug: tulip-mania
    relation_type: SIMILAR_MECHANISM
    note: チューリップバブルが「商品の希少性」への投機だったのに対し、ミシシッピバブルは「紙幣・株式という国家信用に基づく人工物」への投機。「何に対して信頼を置くか」という投機対象の性質は異なるが、「信頼が集合的に形成され、集合的に崩壊する」という構造は共通する。

  - to_case_slug: global-crossing-telecom-bubble
    relation_type: SIMILAR_MECHANISM
    note: 通信バブルも「将来の莫大な需要」という未実現ストーリーで株価が形成され、崩壊後に過剰投資された光ファイバー網が残った。ミシシッピバブルの「ルイジアナの莫大な富」という未実現ストーリーとの構造的類似。ただしミシシッピバブルは通信バブルと違いインフラすら残さなかった点で「純粋なストーリーバブル」の典型。
