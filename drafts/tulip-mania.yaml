# drafts/tulip-mania.yaml
# チューリップバブル——1637年オランダで希少性・先物・ネットワークが融合して起きた史上最古の記録的投機崩壊

case:
  slug: tulip-mania
  title: チューリップバブル——希少性・先物・ネットワークが融合した史上最古の投機崩壊
  one_liner: VOCが生んだ過剰流動性と「壊れたチューリップ」の希少性幻想が融合し、1637年2月に突然崩壊した史上最古の記録的バブル
  summary: >
    17世紀オランダ黄金時代、VOC（東インド会社）がもたらした莫大な富と、チューリップという希少かつ視覚的に劇的な商品が融合して、史上最初の記録的投機バブルが形成された。チューリップ、特に「モザイク病ウイルス」感染によって生まれる炎状の色模様を持つ「壊れ球根（broken bulb）」は、生産が予測不能で模造不可能であったため、極度の希少性プレミアムを帯びた。1630年代中盤には「まだ土の中にある球根」を対象とした先物取引が自然発生的に生まれ、アムステルダム郊外のハーレムを中心とした酒場の非公式取引ネットワーク（college）がその流動性を支えた。ピーク時（1636年末〜1637年初）の「センペル・アウグストゥス」一球の値段は約10,000ギルダーに達し、アムステルダムの高級運河邸宅一棟と同等だった。しかし1637年2月3日、ハーレムでのルーティン競売で突然買い手が現れなかったことをきっかけに、わずか数日で価格は90%超下落した。先物契約の多くは法的に執行不能と判断され、売り手は損失を被った。インフラも技術も残さず、花のみが残ったバブルは、鉄道バブルや通信バブルとは対照的な「純粋な投機崩壊」の原型として位置づけられる。
  period_start: 1593
  period_end: 1637
  status: published
  body_path: content/cases/tulip-mania.md

events:
  - year: 1593
    title: チューリップのオランダ到来——植物学者クルシウスがライデンに持ち込む
    description: フランドル出身の植物学者カロルス・クルシウス（Carolus Clusius）がライデン大学植物園長に就任し、オスマン帝国から持ち帰ったチューリップ球根を植えた。チューリップはオランダの気候に適応し、他のヨーロッパでは見られない鮮やかな単色の花を咲かせた。クルシウスが球根を厳重に管理していたため、熱望した研究者たちが夜中に球根を盗む事件も発生した。これがオランダにおけるチューリップ栽培の起点となった。
    event_type: FOUNDING
    is_turning_point: false
    display_order: 1

  - year: 1602
    title: VOC設立——チューリップバブルを可能にした「余剰資本」の起点
    description: オランダ東インド会社（Vereenigde Oost-Indische Compagnie, VOC）が設立された。世界初の株式公開会社として、株主から資本を集めてアジア貿易の独占権を行使。香辛料貿易による莫大な利益がアムステルダム・ハーレムなどの商人階級に蓄積された。この「投資先を探す余剰資本」の存在が、後のチューリップ投機の燃料となった。VOC自体はチューリップバブルに直接関与しなかったが、投機資本の供給源として決定的な背景役を果たした。
    event_type: FOUNDING
    is_turning_point: false
    display_order: 2

  - year: 1620
    title: 「壊れ球根」ブームの始まり——モザイク病ウイルスが希少性を生む
    description: チューリップに感染する「チューリップ・モザイク病ウイルス」（TBV）が、花弁に炎状・羽根状の色彩模様を生み出すことが観察されるようになった。このウイルス感染球根（"broken bulb"）は、感染したアブラムシによってランダムに広がるため、どの球根から「壊れた」花が咲くかは予測不能だった。「センペル・アウグストゥス」「ヴァイスロイ」などの品種は、この感染によってのみ生まれる究極の希少品として扱われ、富裕な商人・貴族のコレクター需要が急騰した。投機以前に、チューリップは地位財（ステータスシンボル）として確立されていた。
    event_type: PRODUCT_LAUNCH
    is_turning_point: true
    display_order: 3

  - year: 1634
    title: チューリップ取引のプロ化——花商人から投機市場へ
    description: それまで熟練の花卉商（florist）と富裕な愛好家の間で行われていたチューリップ取引に、専業的な仲介業者と投機的参加者が加わり始めた。従来は実物の球根を手渡しで売買していたが、「夏に掘り出す球根を秋〜春に前払いで契約する」という非公式の先物取引が自然発生的に広まった。この変化により、チューリップを育てたことがない商人・職人・一般市民も取引に参加できるようになった。ハーレムの酒場では「college」と呼ばれる非公式な取引会合が開かれるようになった。
    event_type: EXPANSION
    is_turning_point: true
    display_order: 4

  - year: 1636
    title: バブル絶頂——先物契約の連鎖と「センペル・アウグストゥス」10,000ギルダー
    description: 1636年秋から1637年初頭にかけて価格が急騰。「センペル・アウグストゥス」一球が約10,000ギルダー（熟練職人の年収12〜15年分、アムステルダム高級運河邸宅一棟の相場）に達した。ハーレムのcollegeでは、同じ球根が一日に複数回転売されるケースも現れた。多くの契約は「球根を持たない売り手が、まだ土の中にある球根を、代金を持たない買い手に売る」という純粋な差金決済取引に近い状態になっていた。当時のオランダ法ではギャンブル的な先物取引は法的拘束力を持たないという制度的な脆弱性を内包していた。
    event_type: BUBBLE
    is_turning_point: true
    display_order: 5

  - year: 1637
    title: 1637年2月3日——ハーレムの競売で突然買い手が消えた
    description: 1637年2月3日、ハーレムでのルーティン競売でチューリップ球根に買い手が現れなかった。理由は不明のまま「誰かが売るのを止めた」という噂が広まり、数日以内に価格は急落した。数週間後には多くの球根が最高値の1/10以下で取引されていた。買い手側は「先物契約は法的ギャンブルと同様、執行不能」と主張してデフォルトし始め、法廷に持ち込まれた案件のほとんどで裁判所は契約の完全な執行を認めなかった。損失は主に花卉業者（florist）と専業仲介業者が負担し、VOC株主などの大商人の多くは早期に売り抜けていた。
    event_type: CRASH
    is_turning_point: true
    display_order: 6

  - year: 1637
    title: 崩壊後の収拾——オランダ政府の介入と「5%での和解」勧告
    description: 崩壊後、ハーレムおよびアムステルダムの当局は花卉業者と買い手の間の紛争調停に乗り出した。1637年4〜5月にオランダ政府は「先物取引による契約は購入価格の5%の支払いで和解できる」という暫定裁定を示した。しかし法的拘束力はなく、多くの紛争は当事者間の非公式和解か単純な踏み倒しで終わった。投機参加者の多くが損失を被ったが、Anne Goldgarの研究によれば破産に至った人数はマッカイが描いた「社会的惨事」より遥かに少なく、主に専業花卉業者の資産圧縮にとどまった。
    event_type: REGULATORY_CHANGE
    is_turning_point: false
    display_order: 7

entities:
  - slug: carolus-clusius
    name: カロルス・クルシウス（Carolus Clusius）
    kind: PERSON
    description: フランドル出身の植物学者（1526〜1609）。1593年にライデン大学植物園長として着任し、オスマン帝国から持ち込んだチューリップをオランダで定着させた。球根を厳重に管理していたが、研究者による窃盗事件も多発した。チューリップ投機の直接的意図はなく、純粋な植物学的関心から行動したが、オランダへのチューリップ普及という点でバブルの起点を作った人物。
    roles_in_case:
      - ENABLER

  - slug: voc-dutch-east-india
    name: オランダ東インド会社（VOC）
    kind: COMPANY
    description: 1602年設立の世界初の株式公開会社。アジア貿易の独占権を持ち、17世紀前半に莫大な利益をオランダ商人階級にもたらした。VOC自体はチューリップ取引に関与していないが、VOCが生み出した「投資先を探す余剰資本」がチューリップ投機の燃料となった。VOC株の配当として得た資本が、短期間で高い利回りを目指せる投機市場に向かった構図。
    roles_in_case:
      - ENABLER

  - slug: haarlem-florists-college
    name: ハーレムの花卉業者・college参加者
    kind: GROUP
    description: ハーレムを中心とした非公式チューリップ取引ネットワーク。冬季（球根が土の中にある期間）に酒場で集まり、先物契約を締結する「college」と呼ばれる慣行を形成した。参加者は熟練花卉業者から一般職人まで多岐にわたった。この非公式な流動性プールが「実物のない先物取引」を可能にした。崩壊後に最大の損失を被ったのも、早期に売り抜けることができなかったこのグループだった。
    roles_in_case:
      - PROTAGONIST

  - slug: jan-tulp-wealthy-merchants
    name: アムステルダム富裕商人層
    kind: GROUP
    description: VOC株主・香辛料貿易商を中心とする富裕層。チューリップをステータスシンボルとして収集し、希少品種の高値を支えた「実需」側。多くは球根の実物を愛好するコレクターであり、先物投機への関与は限定的だった。崩壊時には高値での売却に成功したケースが多く、「初期に参入し早期に抜けた者が得をした」という構図を体現している。
    roles_in_case:
      - CUSTOMER

  - slug: charles-mackay
    name: チャールズ・マッカイ（Charles Mackay）
    kind: PERSON
    description: スコットランドのジャーナリスト（1814〜1889）。1841年に『Extraordinary Popular Delusions and the Madness of Crowds』でチューリップバブルを「全市民が狂気に陥った群衆心理の典型例」として描写した。しかしAnne Goldgar（2007年）の一次資料研究により、マッカイの記述には大幅な誇張があることが判明している。マッカイ自身の著作がバブルの「神話的記憶」を形成し、以後の投機バブル論の原型となった。「バブルの語られ方もバブルになりうる」という逆説的な存在。
    roles_in_case:
      - OTHER

lessons:
  - statement: 最も価値が高いとされたものは「病気の産物」だった。チューリップ・モザイク病ウイルスに感染した球根だけが炎状の色模様を生み出したが、当時の人々にはウイルスの存在が分からなかった。「希少で美しい」と見えたものの正体は「制御不能な感染によるランダムな突然変異」だった——市場が希少性プレミアムを付けたものの根拠が、実は再現不能な欠陥だったという構造。
    kind: ANTI_PATTERN
    applies_to: 希少性を根拠にした高値評価の妥当性検証。「なぜ希少なのか」の根拠分析（スケール可能な希少性か、再現不能な欠陥による希少性か）
    display_order: 1

  - statement: チューリップバブルは「実物のない先物取引」が自然発生的に生まれた最初期の事例。「まだ土の中にある球根」を売買するcollegeの慣行は、フォーマルな取引所もなく、法的な執行保証もない状態で機能した——流動性は制度より先に生まれる。しかし法的裏付けのない流動性は、崩壊時に買い手がデフォルトしても売り手が救済されないという非対称リスクを内包していた。
    kind: MECHANISM
    applies_to: 新興市場・新資産クラスの取引制度の未整備リスク評価。法的執行力のない市場の流動性の限界分析
    display_order: 2

  - statement: バブル崩壊は外部ショックや内部矛盾ではなく「最初の買い手が来なかった競売」という小さな事件から始まった。メカニズムは不明のまま「誰かが売るのを止めた」という噂が連鎖し、数日で価格が崩壊した。バブルは「買い続ける意志の集合体」であり、その意志が消えた瞬間に崩壊する——崩壊のトリガーは事後にしか特定できないことが多い。
    kind: FORECAST_METHOD
    applies_to: バブル崩壊のタイミング予測。流動性に依存した市場での「最後の買い手問題」の分析
    display_order: 3

  - statement: チューリップバブルは鉄道バブルや通信バブルと違い、崩壊後に何も残さなかった。インフラも技術も制度も残らず、花だけが残った。「バブルの遺産」の有無は、次世代への経済的影響を決定的に変える——投機対象が「実物インフラを建設する副産物」を持つかどうかが、バブルの評価軸のひとつになりうる。
    kind: PATTERN
    applies_to: バブル崩壊後の産業評価。「このバブルが残すインフラ・技術・制度は何か」という問いのフレームワーク
    display_order: 4

  - statement: チャールズ・マッカイの1841年の記述は「全市民が狂気に陥った」という誇張的な物語を広め、200年以上にわたって「バブルの教科書的事例」として引用され続けた。しかしAnne Goldgar（2007年）の一次資料研究では、参加者は主に専業花卉業者と富裕商人層に限られており、一般市民の巻き込まれ度はマッカイの描写より遥かに限定的だった。「バブルの語られ方自体がバブルになった」——過去のバブルの神話化は、次のバブルへの過学習と誤った教訓をもたらすリスクがある。
    kind: HEURISTIC
    applies_to: 歴史的バブル事例の一次資料的検証。二次情報・三次情報に基づく「バブルの教訓」を使う際の信頼性評価
    display_order: 5

sources:
  - source_key: src1
    kind: BOOK
    title: "Tulipmania: Money, Honor, and Knowledge in the Dutch Golden Age"
    author: Anne Goldgar
    publisher: University of Chicago Press
    year: 2007
    notes: チューリップバブルに関する最も厳密な現代学術研究。公証人記録・遺言状・裁判記録などオランダの一次資料を徹底的に調査し、マッカイ以来の「社会全体が狂乱した」という神話を覆した。実際の参加者数・損失規模・社会的影響がマッカイの描写より遥かに限定的であったことを実証。

  - source_key: src2
    kind: BOOK
    title: "Tulipomania: The Story of the World's Most Coveted Flower and the Extraordinary Passions It Aroused"
    author: Mike Dash
    publisher: Crown Publishers
    year: 1999
    notes: ジャーナリスト的アプローチでチューリップバブルを描いた一般向け歴史書。当時のオランダ社会・VOCの繁栄・花卉業者の日常生活を生き生きと描写し、バブルの「文脈」を理解するのに優れた入門書。

  - source_key: src3
    kind: BOOK
    title: "Extraordinary Popular Delusions and the Madness of Crowds"
    author: Charles Mackay
    publisher: Richard Bentley
    year: 1841
    notes: チューリップバブルを「群衆心理による集団的狂気」として描写した古典。現代の研究ではその誇張が明らかになっているが、「バブルの物語がどう語られ、どう神話化されるか」を示す一次資料として依然価値を持つ。

  - source_key: src4
    kind: BOOK
    title: "The Tulip: The Story of a Flower That Has Made Men Mad"
    author: Anna Pavord
    publisher: Bloomsbury Publishing
    year: 1999
    notes: チューリップの植物学的・文化的・経済的歴史を網羅した大著。「壊れ球根（broken bulb）」とチューリップ・モザイク病ウイルスの関係を詳細に解説しており、バブルの「商品的特性」を理解するのに不可欠。

relations:
  - to_case_slug: railway-mania-1840s
    relation_type: CONTRAST
    note: 鉄道バブルは崩壊後に9500マイルのインフラを残したが、チューリップバブルは花以外の何も残さなかった。「投機が副産物として生む実物資産の有無」が二つのバブルを決定的に分ける。鉄道バブルは「インフラバブル」、チューリップバブルは「純粋投機バブル」の原型として対比できる。

  - to_case_slug: global-crossing-telecom-bubble
    relation_type: SIMILAR_MECHANISM
    note: 通信バブル期のCLEC株式やネットワーク容量スワップは、チューリップの先物contractと同様、「実際には誰も使っていない将来価値」を売買していた。法的裏付けのない流動性が崩壊時に消えるという共通メカニズム。

  - to_case_slug: opec-oil-crisis
    relation_type: CONTRAST
    note: OPECオイルショックは供給側の意図的な制限による価格高騰、チューリップバブルは需要側の投機的過熱——起動メカニズムが対照的。「希少性の根拠が実物の供給制限か、幻想的な需要熱狂か」の対比として読める。
